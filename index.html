<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>FLOU — share life in frames ✨ premium experience</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="authContainer">
  <div id="loginView" class="auth-panel">
    <h2 class="logo-text">flou ✨</h2>
    <p class="subheadline">Share moments, instantly</p>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="doLoginBtn" class="btn-glow">Log in →</button>
    <p class="switch-action"><span id="showSignupLink" class="link">✨ Create account</span></p>
    <p class="switch-action"><span id="showForgotLink" class="link">Forgot password?</span></p>
  </div>
  <div id="signupView" class="auth-panel" style="display:none;">
    <h3 class="auth-title">Join flou</h3>
    <input type="text" id="signupName" placeholder="Full name">
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPassword" placeholder="Password">
    <button id="doSignupBtn" class="btn-glow">Sign up</button>
    <p class="switch-action"><span id="backToLoginBtn" class="link">← Back</span></p>
  </div>
  <div id="resetView" class="auth-panel" style="display:none;">
    <h3 class="auth-title">Reset password</h3>
    <input type="email" id="resetEmail" placeholder="Your email">
    <button id="sendResetBtn" class="btn-glow">Send reset link</button>
    <p class="switch-action"><span id="backToLoginReset" class="link">Back to login</span></p>
  </div>
</div>

<div id="appMain" style="display:none;">
  <div class="top-notif-icon">
    <button id="notifIconBtn" class="glass-btn-icon"><i class="far fa-bell"></i><span id="globalNotifBadge" class="badge-notify" style="display:none;">0</span></button>
  </div>
  <div class="bottom-nav">
    <button class="nav-item" data-route="home"><i class="fas fa-home"></i></button>
    <button class="nav-item" data-route="friends"><i class="fas fa-user-friends"></i></button>
    <button class="nav-item" data-route="search"><i class="fas fa-search"></i></button>
    <button class="nav-item" data-route="messages" id="messagesNavBtn"><i class="fas fa-comment-dots"></i><span id="unreadMessagesBadge" class="msg-badge" style="display: none;">0</span></button>
    <button class="nav-item" data-route="profile"><i class="fas fa-user"></i></button>
  </div>

  <div id="homePage" class="page"><div id="homeFeed"></div><div id="createPostFab" class="fab-create"><i class="fas fa-plus"></i> Post</div></div>
  <div id="friendsPage" class="page"><div id="friendsFeed"></div></div>
  <div id="searchPage" class="page"><input type="text" id="searchInput" placeholder="🔍 Search users..."><div id="searchResults"></div></div>
  <div id="messagesPage" class="page"><div id="chatUserList" class="chat-users-list"></div><div id="chatArea" class="glass-card chat-container"><div id="chatMessages" class="chat-messages-area"></div><div class="chat-input-row"><input type="text" id="chatInput" placeholder="Message..." class="chat-input"><button id="sendMsgButton" class="btn-glow send-btn"><i class="fas fa-paper-plane"></i></button><button id="attachImageButton" class="icon-btn"><i class="fas fa-image"></i></button></div><input type="file" id="chatImageInput" accept="image/*" style="display:none;"></div></div>
  <div id="profilePage" class="page"><div id="profileHeader"></div><div id="profileStats" class="profile-stats"></div><div id="profileActions" class="profile-actions"></div><div id="profilePostsGrid" class="profile-grid"></div><button id="openSettingsBtn" class="secondary-btn"><i class="fas fa-sliders-h"></i> Settings</button><button id="logoutProfileBtn" class="logout-btn">Logout</button></div>
  <div id="notificationsPage" class="page"><h3 class="page-title">🔔 Notifications</h3><div id="notificationsList"></div></div>
  <div id="settingsPage" class="page"><h3 class="page-title">⚙️ Settings</h3><div class="glass-card settings-card">
    <div class="theme-toggle"><span><i class="fas fa-sun"></i> Dark/Light Mode</span><div id="themeToggleSwitch" class="toggle-switch"><div class="toggle-knob"></div></div></div>
    <div id="settingsAvatarClick" class="avatar-upload-section"><img id="settingsAvatar" class="settings-avatar"><div><i class="fas fa-camera"></i> Change avatar</div></div>
    <input type="file" id="avatarUploadInput" accept="image/*" style="display:none;">
    <label>Display Name</label><input type="text" id="settingsName" class="settings-input">
    <button id="updateNameBtn" class="btn-glow full-width">Update Name</button><hr class="divider">
    <button id="settingsResetPwdBtn" class="warning-btn">Reset Password</button>
    <button id="settingsDeleteAccountBtn" class="danger-btn">Delete Account</button>
    <button id="settingsLogoutBtn" class="secondary-outline">Logout</button>
  </div></div>
</div>
<script src="script.js"></script>
</body>
</html>
